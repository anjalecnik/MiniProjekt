services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      backend-nodejs:
        condition: service_healthy

  # ── Node.js + Fastify (privzeti backend) ─────────────────────────────────
  backend-nodejs:
    build:
      context: ./backend/nodejs
    environment:
      DATABASE_URL: /data/health.db
      NODE_ENV: production
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:example@example.com}
    ports:
      - "3000:3000"
    volumes:
      - nodejs-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── .NET 8 + ASP.NET Core Minimal API ────────────────────────────────────
  backend-dotnet:
    build:
      context: ./backend/dotnet
    environment:
      DATABASE_URL: /data/health.db
    ports:
      - "3001:3000"
    volumes:
      - dotnet-data:/data
    profiles:
      - dotnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ── Ruby 3 + Sinatra + Puma ───────────────────────────────────────────────
  backend-ruby:
    build:
      context: ./backend/ruby
    environment:
      DATABASE_URL: /data/health.db
      RACK_ENV: production
    ports:
      - "3002:3000"
    volumes:
      - ruby-data:/data
    profiles:
      - ruby
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  nodejs-data:
  dotnet-data:
  ruby-data:
